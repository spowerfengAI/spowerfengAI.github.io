<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>點我+1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
:root {
  --bg1: #0d0221;
  --bg2: #1a0533;
  --accent: #f43f5e;
  --gold: #fbbf24;
  --purple: #8b5cf6;
  --cyan: #06b6d4;
  --font: 'Nunito', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: var(--font);
  background: var(--bg1);
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
  overflow: hidden;
  touch-action: manipulation;
}
/* Animated BG */
.bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
.container {
  position: relative; z-index: 1;
  background: linear-gradient(160deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
  border: 1px solid rgba(255,255,255,0.12);
  padding: clamp(16px,4vw,28px);
  border-radius: 40px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
  width: 100%; max-width: 440px;
  display: flex; flex-direction: column; align-items: center;
  backdrop-filter: blur(20px);
}
/* Title */
.title-wrap { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.title-icon { font-size:1.8rem; animation: floatIcon 3s ease-in-out infinite; }
@keyframes floatIcon { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-6px) rotate(5deg)} }
h1 {
  font-size:1.4rem; font-weight:900; letter-spacing:4px;
  background: linear-gradient(135deg, #f43f5e 0%, #fb923c 40%, #fbbf24 70%, #a78bfa 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter: drop-shadow(0 0 12px rgba(244,63,94,0.4));
}
/* Stats */
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; margin-bottom:10px; }
.stat-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 10px 6px; border-radius:16px; text-align:center;
  transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card label { display:block; font-size:0.55rem; color:rgba(255,255,255,0.4); font-weight:800; margin-bottom:3px; text-transform:uppercase; letter-spacing:1px; }
.stat-card span { font-size:1rem; font-weight:900; color:#fff; }
.stat-card.hot { background:rgba(244,63,94,0.15); border-color:rgba(244,63,94,0.3); }
.stat-card.hot span { color:#fb7185; }
/* Score */
.score-wrap { position:relative; margin:4px 0 12px; }
.score-val {
  font-size: clamp(3rem,10vw,4.5rem); font-weight:900; color:#fff;
  letter-spacing:-4px; text-align:center;
  text-shadow: 0 0 40px rgba(139,92,246,0.5), 0 4px 20px rgba(0,0,0,0.4);
  transition: transform 0.1s;
}
.score-val.bump { animation: scoreBump 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes scoreBump { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
/* Energy */
.energy-bar-container { width:100%; margin-bottom:16px; }
.energy-text { font-size:0.72rem; font-weight:800; margin-bottom:6px; display:flex; justify-content:space-between; color:rgba(255,255,255,0.5); }
.energy-pips { display:flex; gap:6px; }
.pip {
  flex:1; height:10px; border-radius:20px;
  background: rgba(255,255,255,0.1);
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; overflow:hidden;
}
.pip.active {
  background: linear-gradient(90deg, #f43f5e, #fb923c);
  box-shadow: 0 0 10px rgba(244,63,94,0.6);
}
.pip.active::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: pipShine 1.5s infinite;
}
@keyframes pipShine { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
/* Board */
.game-board-wrapper {
  position:relative; width:100%; padding:12px;
  background: linear-gradient(145deg, #1e0a3c, #0d0221);
  border-radius:28px;
  border: 1px solid rgba(139,92,246,0.3);
  box-shadow: 0 0 0 1px rgba(139,92,246,0.1), 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  margin-bottom:16px;
}
.board-glow {
  position:absolute; inset:-1px; border-radius:28px; pointer-events:none;
  background: radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.15) 0%, transparent 70%);
}
.game-board {
  display:grid; grid-template-columns:repeat(5,1fr); gap:7px;
  aspect-ratio:1/1; width:100%;
}
/* Cells */
.cell {
  position:relative; border-radius:14px;
  display:flex; justify-content:center; align-items:center;
  font-size:clamp(1.4rem,4.5vw,1.9rem); font-weight:900;
  cursor:pointer; user-select:none;
  transition: transform 0.12s, box-shadow 0.2s;
  overflow:hidden;
}
.cell::before {
  content:''; position:absolute; inset:0; border-radius:14px;
  background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
  z-index:2; pointer-events:none;
}
.cell::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:4px;
  background: rgba(0,0,0,0.25); border-radius:0 0 14px 14px;
  z-index:2; pointer-events:none;
}
.cell:active { transform: scale(0.9); }
.cell span { position:relative; z-index:3; color:#fff; pointer-events:none; text-shadow:0 2px 8px rgba(0,0,0,0.5); }
/* Cell colors - richer gradients */
.c1  { background: linear-gradient(135deg,#ff6b9d,#ff8fab); box-shadow:0 4px 15px rgba(255,107,157,0.4); }
.c2  { background: linear-gradient(135deg,#4facfe,#00f2fe); box-shadow:0 4px 15px rgba(79,172,254,0.4); }
.c3  { background: linear-gradient(135deg,#43e97b,#38f9d7); box-shadow:0 4px 15px rgba(67,233,123,0.4); }
.c4  { background: linear-gradient(135deg,#fa709a,#fee140); box-shadow:0 4px 15px rgba(250,112,154,0.4); }
.c5  { background: linear-gradient(135deg,#a18cd1,#fbc2eb); box-shadow:0 4px 15px rgba(161,140,209,0.4); }
.c6  { background: linear-gradient(135deg,#f093fb,#f5576c); box-shadow:0 4px 15px rgba(240,147,251,0.5); }
.c7  { background: linear-gradient(135deg,#4facfe,#764ba2); box-shadow:0 4px 15px rgba(118,75,162,0.5); }
.c8  { background: linear-gradient(135deg,#667eea,#764ba2); box-shadow:0 4px 15px rgba(102,126,234,0.5); }
.c9  { background: linear-gradient(135deg,#f7971e,#ffd200); box-shadow:0 4px 15px rgba(247,151,30,0.5); }
.c10 { background: linear-gradient(135deg,#f43f5e,#7c3aed); box-shadow:0 4px 15px rgba(244,63,94,0.6); }
/* Animations */
.cell.dropping { animation: dropIn 0.45s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes dropIn { 0%{transform:translateY(-50px) scale(0.7);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }
.cell.merging { z-index:200!important; transition:transform 0.2s ease,opacity 0.2s ease!important; }
.cell.target-pulse { animation: tPulse 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes tPulse { 0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1)} }
.cell.idle-bounce { animation: idleBounce 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes idleBounce { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }
/* Shake */
@keyframes shake {
  0%{transform:translate(2px,2px) rotate(0deg)} 10%{transform:translate(-2px,-3px) rotate(-1deg)}
  20%{transform:translate(-4px,0) rotate(1deg)} 30%{transform:translate(4px,3px) rotate(0deg)}
  40%{transform:translate(2px,-2px) rotate(1deg)} 50%{transform:translate(-2px,3px) rotate(-1deg)}
  60%{transform:translate(-4px,2px) rotate(0deg)} 70%{transform:translate(4px,2px) rotate(-1deg)}
  80%{transform:translate(-2px,-2px) rotate(1deg)} 90%{transform:translate(2px,3px) rotate(0deg)}
  100%{transform:translate(2px,-3px) rotate(-1deg)}
}
.shake-active { animation: shake 0.18s infinite; }
/* Buttons */
.btn-row { display:flex; gap:10px; width:100%; }
.btn {
  flex:1; padding:14px; border-radius:18px; border:none;
  font-family:var(--font); font-weight:900; font-size:1rem;
  cursor:pointer; letter-spacing:2px; transition:all 0.1s;
  position:relative; overflow:hidden;
}
.btn::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  pointer-events:none;
}
.btn-reset {
  background: linear-gradient(135deg,#7c3aed,#4f46e5);
  color:#fff;
  box-shadow: 0 6px 0 #3730a3, 0 10px 30px rgba(124,58,237,0.4);
}
.btn-reset:active { transform:translateY(4px); box-shadow:0 2px 0 #3730a3; }
.btn-hint {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow: 0 6px 0 #020617, 0 10px 20px rgba(0,0,0,0.3);
  flex:0 0 auto; padding:14px 18px;
}
.btn-hint:active { transform:translateY(4px); box-shadow:0 2px 0 #020617; }
/* Hint highlight */
.cell.hint-glow { animation: hintGlow 0.8s ease-in-out infinite alternate; }
@keyframes hintGlow {
  0%{box-shadow:0 0 0 3px rgba(251,191,36,0.4), 0 0 20px rgba(251,191,36,0.3)}
  100%{box-shadow:0 0 0 5px rgba(251,191,36,0.8), 0 0 35px rgba(251,191,36,0.6)}
}
/* Modal */
.modal {
  position:fixed; inset:0; background:rgba(5,0,20,0.92);
  display:none; align-items:center; justify-content:center;
  z-index:1000; backdrop-filter:blur(16px);
}
.modal.active { display:flex; animation: modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes modalIn { 0%{opacity:0;transform:scale(0.8)} 100%{opacity:1;transform:scale(1)} }
.modal-card {
  background: linear-gradient(160deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
  border:1px solid rgba(255,255,255,0.15);
  padding:50px 30px; border-radius:36px; text-align:center;
  width:90%; max-width:360px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
}
.modal-card h2 { font-size:2rem; font-weight:900; color:#fff; }
.modal-card p { color:rgba(255,255,255,0.5); margin-top:8px; font-weight:700; }
.modal-score { font-size:4.5rem; font-weight:900; letter-spacing:-4px; margin:16px 0 30px; background:linear-gradient(135deg,#f43f5e,#fbbf24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.modal-btn { width:100%; padding:16px; border-radius:18px; border:none; background:linear-gradient(135deg,#f43f5e,#e11d48); color:#fff; font-family:var(--font); font-weight:900; font-size:1.1rem; cursor:pointer; box-shadow:0 6px 0 #9f1239, 0 10px 30px rgba(244,63,94,0.4); letter-spacing:2px; transition:all 0.1s; }
.modal-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #9f1239; }
/* Floating feedback */
.floating-container { position:fixed; pointer-events:none; z-index:2000; display:flex; flex-direction:column; align-items:center; }
.floating-pts { color:#fff; font-weight:900; font-size:1.5rem; animation:ptsFly 0.9s ease-out forwards; text-shadow:0 0 20px rgba(251,191,36,0.8), 0 2px 8px rgba(0,0,0,0.5); }
@keyframes ptsFly { 0%{transform:translateY(0) scale(0.5);opacity:0} 15%{opacity:1;transform:translateY(-10px) scale(1.1)} 100%{transform:translateY(-70px) scale(0.9);opacity:0} }
.floating-combo { color:#fbbf24; font-weight:900; font-size:2.5rem; font-style:italic; animation:comboPop 0.9s cubic-bezier(0.34,1.56,0.64,1) forwards; text-shadow:0 0 30px rgba(251,191,36,0.8); margin-top:-8px; }
@keyframes comboPop { 0%{transform:scale(0.2) rotate(-20deg);opacity:0} 35%{transform:scale(1.6) rotate(10deg);opacity:1} 100%{transform:translateY(-60px) scale(1.1) rotate(0deg);opacity:0} }
/* Particle canvas */
.particle-canvas { position:fixed; inset:0; pointer-events:none; z-index:500; }
/* Level badge */
.level-badge {
  position:absolute; top:-12px; right:20px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  color:#000; font-weight:900; font-size:0.65rem;
  padding:4px 12px; border-radius:20px; letter-spacing:2px;
  box-shadow:0 4px 12px rgba(251,191,36,0.5);
}
/* Multiplier display */
.multiplier-wrap { display:flex; align-items:center; gap:8px; margin-bottom:10px; width:100%; }
.multiplier-label { font-size:0.65rem; color:rgba(255,255,255,0.4); font-weight:800; text-transform:uppercase; letter-spacing:1px; }
.multiplier-val { font-size:1.1rem; font-weight:900; color:#fbbf24; text-shadow:0 0 15px rgba(251,191,36,0.6); transition:all 0.3s; }
.multiplier-bar { flex:1; height:6px; background:rgba(255,255,255,0.08); border-radius:10px; overflow:hidden; }
.multiplier-fill { height:100%; background:linear-gradient(90deg,#fbbf24,#f59e0b); border-radius:10px; transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
</style>
</head>
<body>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<canvas class="particle-canvas" id="particleCanvas"></canvas>
<div class="container" id="main-container">
  <div class="title-wrap">
    <span class="title-icon">✨</span>
    <h1>點我 +1</h1>
    <span class="title-icon">✨</span>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><label>最佳得分</label><span id="best-score">0</span></div>
    <div class="stat-card"><label>最大號碼</label><span id="best-num">1</span></div>
    <div class="stat-card hot"><label>最高連擊</label><span id="best-combo">0</span></div>
  </div>
  <div class="score-wrap"><div class="score-val" id="score">0</div></div>
  <div class="multiplier-wrap">
    <span class="multiplier-label">連擊倍率</span>
    <span class="multiplier-val" id="combo-display">x1</span>
    <div class="multiplier-bar"><div class="multiplier-fill" id="combo-fill" style="width:0%"></div></div>
  </div>
  <div class="energy-bar-container">
    <div class="energy-text"><span>⚡ 能量</span><span id="energy-count">5 / 5</span></div>
    <div class="energy-pips" id="energy-pips"></div>
  </div>
  <div class="game-board-wrapper">
    <div class="board-glow"></div>
    <div class="level-badge" id="level-badge">LV 1</div>
    <div class="game-board" id="board"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-hint" id="hint-btn" onclick="showHint()">💡</button>
    <button class="btn btn-reset" onclick="resetGame()">重開一局</button>
  </div>
</div>
<div class="modal" id="game-over-modal">
  <div class="modal-card">
    <div style="font-size:3rem;margin-bottom:10px">🎮</div>
    <h2>遊戲結束</h2>
    <p>本次得分</p>
    <div class="modal-score" id="final-score">0</div>
    <button class="modal-btn" onclick="resetGame()">再戰一回 🔥</button>
  </div>
</div>
<script>
// ── Background animated stars ──
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
const stars = Array.from({length:120}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random()*1.5+0.3, a: Math.random(),
  speed: Math.random()*0.0003+0.0001
}));
function resizeBg() { bgCanvas.width=innerWidth; bgCanvas.height=innerHeight; }
resizeBg(); window.addEventListener('resize', resizeBg);
function drawBg() {
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  const g = bgCtx.createRadialGradient(bgCanvas.width*0.3,bgCanvas.height*0.2,0,bgCanvas.width*0.5,bgCanvas.height*0.5,bgCanvas.width);
  g.addColorStop(0,'#1a0533'); g.addColorStop(0.5,'#0d0221'); g.addColorStop(1,'#000');
  bgCtx.fillStyle=g; bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  stars.forEach(s => {
    s.a += s.speed; if(s.a>1) s.a=0;
    const alpha = Math.sin(s.a*Math.PI)*0.8+0.1;
    bgCtx.beginPath(); bgCtx.arc(s.x*bgCanvas.width, s.y*bgCanvas.height, s.r, 0, Math.PI*2);
    bgCtx.fillStyle=`rgba(255,255,255,${alpha})`; bgCtx.fill();
  });
  requestAnimationFrame(drawBg);
}
drawBg();

// ── Particle system ──
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
const particles = [];
function resizeP() { pCanvas.width=innerWidth; pCanvas.height=innerHeight; }
resizeP(); window.addEventListener('resize', resizeP);
function spawnParticles(x, y, color, count=18) {
  for(let i=0;i<count;i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const speed = Math.random()*5+2;
    particles.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 2,
      r: Math.random()*5+3, color, alpha:1, life:1,
      decay: Math.random()*0.03+0.02, gravity:0.15
    });
  }
}
function drawParticles() {
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity;
    p.vx*=0.97; p.life-=p.decay; p.alpha=p.life;
    if(p.life<=0){particles.splice(i,1);continue;}
    pCtx.save(); pCtx.globalAlpha=p.alpha;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pCtx.fillStyle=p.color; pCtx.fill(); pCtx.restore();
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── Sound ──
const SoundSystem = {
  ctx: null,
  init() { if(!this.ctx) this.ctx=new(window.AudioContext||window.webkitAudioContext)(); if(this.ctx.state==='suspended') this.ctx.resume(); },
  play(action, combo=1) {
    this.init();
    if(action==='tap') { this.tone(600,0.08,0.08,'sine'); this.tone(900,0.05,0.06,'sine'); }
    else if(action==='match') {
      const base = 400+combo*80;
      this.tone(base,0.15,0.1,'sine');
      setTimeout(()=>this.tone(base*1.25,0.2,0.15,'sine'),60);
      setTimeout(()=>this.tone(base*1.5,0.25,0.25,'sine'),120);
      if(combo>=5) setTimeout(()=>this.tone(base*2,0.3,0.3,'triangle'),200);
    } else if(action==='gameover') {
      [400,350,300,250].forEach((f,i)=>setTimeout(()=>this.tone(f,0.2,0.3,'sawtooth'),i*120));
    }
  },
  tone(f,v,d,type='sine') {
    const now=this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(f,now);
    o.connect(g); g.connect(this.ctx.destination);
    g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.0001,now+d);
    o.start(); o.stop(now+d);
  }
};

// ── Game state ──
const colorClasses = ['c1','c2','c3','c4','c5','c6','c7','c8','c9','c10'];
const cellColors = ['#ff6b9d','#4facfe','#43e97b','#fa709a','#a18cd1','#f093fb','#4facfe','#667eea','#f7971e','#f43f5e'];
let state = { board:[], score:0, energy:5, combo:0, isLocked:false, level:1, totalMerges:0 };
const cells = [];
let hintTimeout = null;
let hintCells = [];

function init() {
  ['mousedown','touchstart'].forEach(e=>document.body.addEventListener(e,()=>SoundSystem.init(),{once:true}));
  buildPips();
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  cells.length = 0;
  for(let i=0;i<25;i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const span = document.createElement('span');
    cell.appendChild(span);
    cell.addEventListener('click', ()=>handleCellClick(i));
    boardEl.appendChild(cell);
    cells.push({el:cell, span});
  }
  loadData();
  if(!state.board||state.board.length===0) resetGame();
  else render(true);
}

function buildPips() {
  const container = document.getElementById('energy-pips');
  container.innerHTML = '';
  for(let i=0;i<5;i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    pip.id = `pip-${i}`;
    container.appendChild(pip);
  }
}

function loadData() {
  const saved = localStorage.getItem('clickgame_v3');
  if(saved) { state=JSON.parse(saved); state.isLocked=false; }
}

function saveData() {
  localStorage.setItem('clickgame_v3', JSON.stringify(state));
  const bs=Number(localStorage.getItem('cg_best_score'))||0;
  if(state.score>bs) localStorage.setItem('cg_best_score',state.score);
  const maxVal=Math.max(...state.board,1);
  const bn=Number(localStorage.getItem('cg_best_num'))||1;
  if(maxVal>bn) localStorage.setItem('cg_best_num',maxVal);
  const bc=Number(localStorage.getItem('cg_best_combo'))||0;
  if(state.combo>bc) localStorage.setItem('cg_best_combo',state.combo);
}

function resetGame() {
  document.getElementById('game-over-modal').classList.remove('active');
  state.board = Array(25).fill(0).map(()=>Math.floor(Math.random()*4)+1);
  state.score=0; state.energy=5; state.combo=0; state.isLocked=false;
  state.level=1; state.totalMerges=0;
  clearHint();
  saveData(); render(true);
}

function getLevel(merges) { return Math.floor(merges/10)+1; }

function render(full=false) {
  state.board.forEach((val,i)=>{
    const c=cells[i];
    const cls = 'cell ' + (colorClasses[(val-1)%10]||'');
    if(full || c.el.className!==cls) {
      c.el.className = cls;
      c.span.innerText = val||'';
      c.el.style.opacity = val===0?'0':'1';
      c.el.style.pointerEvents = val===0?'none':'auto';
    }
  });
  // Score
  const scoreEl = document.getElementById('score');
  scoreEl.innerText = state.score.toLocaleString();
  // Energy pips
  for(let i=0;i<5;i++) {
    const pip=document.getElementById(`pip-${i}`);
    if(pip) pip.className='pip'+(i<state.energy?' active':'');
  }
  document.getElementById('energy-count').innerText=`${state.energy} / 5`;
  // Combo display
  const comboEl=document.getElementById('combo-display');
  const comboFill=document.getElementById('combo-fill');
  comboEl.innerText=`x${Math.max(1,state.combo)}`;
  comboFill.style.width=`${Math.min(state.combo/10*100,100)}%`;
  if(state.combo>=5) comboEl.style.color='#f43f5e';
  else if(state.combo>=3) comboEl.style.color='#fb923c';
  else comboEl.style.color='#fbbf24';
  // Level
  const lv=getLevel(state.totalMerges);
  document.getElementById('level-badge').innerText=`LV ${lv}`;
  // Best stats
  document.getElementById('best-score').innerText=(localStorage.getItem('cg_best_score')||0).toLocaleString();
  document.getElementById('best-num').innerText=localStorage.getItem('cg_best_num')||1;
  document.getElementById('best-combo').innerText=localStorage.getItem('cg_best_combo')||0;
}

async function handleCellClick(idx) {
  if(state.isLocked||state.energy<=0) return;
  clearHint();
  state.isLocked=true;
  SoundSystem.play('tap');
  state.energy--; state.board[idx]++; state.combo=0;
  cells[idx].el.classList.add('idle-bounce');
  setTimeout(()=>cells[idx].el.classList.remove('idle-bounce'),500);
  render();
  await processMatches(idx);
  state.isLocked=false;
  saveData(); render();
  if(state.energy<=0&&!hasPossibleMatch()) {
    SoundSystem.play('gameover');
    document.getElementById('final-score').innerText=state.score.toLocaleString();
    document.getElementById('game-over-modal').classList.add('active');
  }
}

async function processMatches(startIdx) {
  let targetIdx=startIdx;
  while(targetIdx!==-1) {
    const matches=findMatches(targetIdx);
    if(matches.length>=3) {
      state.combo++;
      state.totalMerges++;
      const bc=Number(localStorage.getItem('cg_best_combo'))||0;
      if(state.combo>bc) { localStorage.setItem('cg_best_combo',state.combo); document.getElementById('best-combo').innerText=state.combo; }
      const val=state.board[targetIdx];
      const ptsAdded=val*matches.length*state.combo*10;
      state.score+=ptsAdded;
      state.energy=Math.min(5,state.energy+1);
      SoundSystem.play('match',state.combo);
      // Score bump
      const scoreEl=document.getElementById('score');
      scoreEl.classList.remove('bump'); void scoreEl.offsetWidth; scoreEl.classList.add('bump');
      // Particles
      const rect=cells[targetIdx].el.getBoundingClientRect();
      const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
      const color=cellColors[(val-1)%10];
      spawnParticles(cx,cy,color,state.combo>=5?30:18);
      if(state.combo>=3) spawnParticles(cx,cy,'#fbbf24',10);
      showFeedback(targetIdx,`+${ptsAdded}`,state.combo);
      if(state.combo>=8) {
        const c=document.getElementById('main-container');
        c.classList.add('shake-active');
        setTimeout(()=>c.classList.remove('shake-active'),300);
      }
      // Merge animation
      const movePromises=matches.filter(i=>i!==targetIdx).map(async(i)=>{
        const cellEl=cells[i].el;
        const tRect=cells[targetIdx].el.getBoundingClientRect();
        const oRect=cellEl.getBoundingClientRect();
        cellEl.classList.add('merging');
        cellEl.style.transform=`translate(${tRect.left-oRect.left}px,${tRect.top-oRect.top}px) scale(0.2)`;
        cellEl.style.opacity='0';
        state.board[i]=0;
      });
      await Promise.all([...movePromises, new Promise(r=>setTimeout(r,200))]);
      matches.forEach(i=>{ cells[i].el.classList.remove('merging'); cells[i].el.style.transform=''; cells[i].el.style.opacity='1'; });
      state.board[targetIdx]++;
      cells[targetIdx].el.classList.add('target-pulse');
      render();
      await new Promise(r=>setTimeout(r,220));
      cells[targetIdx].el.classList.remove('target-pulse');
      await applyGravity();
      targetIdx=-1;
      for(let i=0;i<25;i++) { if(state.board[i]>0&&findMatches(i).length>=3){targetIdx=i;break;} }
    } else { targetIdx=-1; }
  }
}

function findMatches(idx) {
  const val=state.board[idx]; if(!val) return [];
  const queue=[idx], result=[], visited=new Set([idx]);
  while(queue.length>0) {
    const curr=queue.shift(); result.push(curr);
    const r=Math.floor(curr/5), c=curr%5;
    [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
      const ni=nr*5+nc;
      if(nr>=0&&nr<5&&nc>=0&&nc<5&&!visited.has(ni)&&state.board[ni]===val) { visited.add(ni); queue.push(ni); }
    });
  }
  return result;
}

async function applyGravity() {
  let dropped=false;
  for(let c=0;c<5;c++) {
    let emptyRow=-1;
    for(let r=4;r>=0;r--) {
      const idx=r*5+c;
      if(state.board[idx]===0) { if(emptyRow===-1) emptyRow=r; }
      else if(emptyRow!==-1) {
        state.board[emptyRow*5+c]=state.board[idx]; state.board[idx]=0;
        cells[emptyRow*5+c].el.classList.add('dropping'); emptyRow--; dropped=true;
      }
    }
    for(let r=emptyRow;r>=0&&r!==-1;r--) {
      state.board[r*5+c]=Math.floor(Math.random()*4)+1;
      cells[r*5+c].el.classList.add('dropping'); dropped=true;
    }
  }
  render();
  if(dropped) { await new Promise(r=>setTimeout(r,480)); cells.forEach(c=>c.el.classList.remove('dropping')); }
}

function hasPossibleMatch() {
  for(let i=0;i<25;i++) { if(state.board[i]>0&&findMatches(i).length>=3) return true; }
  return false;
}

function showHint() {
  clearHint();
  // Find best group
  let best=[], bestScore=0;
  for(let i=0;i<25;i++) {
    if(state.board[i]===0) continue;
    const m=findMatches(i);
    if(m.length>bestScore) { bestScore=m.length; best=m; }
  }
  if(best.length<2) return;
  hintCells=best;
  best.forEach(i=>cells[i].el.classList.add('hint-glow'));
  hintTimeout=setTimeout(clearHint,2000);
}

function clearHint() {
  if(hintTimeout) clearTimeout(hintTimeout);
  hintCells.forEach(i=>{ if(cells[i]) cells[i].el.classList.remove('hint-glow'); });
  hintCells=[];
}

function showFeedback(idx, pts, combo) {
  const rect=cells[idx].el.getBoundingClientRect();
  const div=document.createElement('div');
  div.className='floating-container';
  div.style.left=`${rect.left+rect.width/2}px`;
  div.style.top=`${rect.top+rect.height/2}px`;
  div.style.transform='translate(-50%,-50%)';
  const p=document.createElement('div');
  p.className='floating-pts'; p.innerText=pts;
  div.appendChild(p);
  if(combo>1) {
    const c=document.createElement('div');
    c.className='floating-combo';
    c.innerText=`COMBO x${combo}`;
    if(combo>=10) { c.style.fontSize='3.2rem'; c.style.color='#f43f5e'; }
    if(combo>=20) { c.style.fontSize='4rem'; c.style.color='#fbbf24'; }
    div.appendChild(c);
  }
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),900);
}

window.onload=init;
</script>
