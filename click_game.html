<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>點我+1 - 終極連擊挑戰</title>
    <!-- 這裡的所有內容都是自包含的，不需要登入即可遊玩 -->
    <style>
        :root {
            --bg-color: #f8fafc;
            --container-bg: #ffffff;
            --text-color: #0f172a;
            --accent: #f43f5e;
            --font-main: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            --board-bg: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            background: var(--container-bg);
            padding: clamp(15px, 4vw, 25px);
            border-radius: 40px;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.1s ease-out;
        }

        /* 螢幕震動特效 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-active { animation: shake 0.2s infinite; }

        .title-pill {
            display: inline-block; padding: 8px 24px;
            background: linear-gradient(135deg, #ffffff, #f1f5f9);
            border-radius: 50px; margin-bottom: 12px; border: 2px solid #ffffff;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
            animation: floatTitle 3s ease-in-out infinite;
        }
        @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        h1 {
            font-size: 1.2rem; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(135deg, #f43f5e, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 8px; }
        .stat-card { background: #f8fafc; padding: 8px; border-radius: 15px; text-align: center; border: 1px solid #f1f5f9; }
        .stat-card label { display: block; font-size: 0.6rem; opacity: 0.5; font-weight: 800; text-transform: uppercase; }
        .stat-card span { font-size: 0.9rem; font-weight: 900; color: #64748b; }

        .score-val { font-size: 3.5rem; font-weight: 900; margin: 0; color: #0f172a; letter-spacing: -2px; }

        .energy-bar-container { width: 100%; margin-bottom: 15px; }
        .energy-text { font-size: 0.7rem; font-weight: 800; margin-bottom: 4px; display: flex; justify-content: space-between; color: #94a3b8; }
        .bar-bg { height: 10px; background: #e2e8f0; border-radius: 20px; padding: 2px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #f43f5e, #fb7185); border-radius: 20px; width: 100%; transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .game-board {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            padding: 10px; background: var(--board-bg); border-radius: 24px;
            aspect-ratio: 1 / 1; width: 100%; margin-bottom: 15px;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.08); position: relative;
        }

        .cell {
            position: relative; background: #ffffff; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; font-weight: 900; 
            cursor: pointer; user-select: none; box-shadow: 0 4px 0px #94a3b8;
            z-index: 1; will-change: transform, opacity;
        }

        .cell-inner { position: absolute; inset: 0; z-index: 1; transition: background 0.3s ease; border-radius: 12px; }

        /* 數字顏色漸變 */
        .color-1 { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); }
        .color-2 { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .color-3 { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .color-4 { background: linear-gradient(135deg, #fccb90 0%, #d57eeb 100%); }
        .color-5 { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); }
        .color-6 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .color-7 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .color-8 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .color-9 { background: linear-gradient(135deg, #243949 0%, #517fa4 100%); }
        .color-10 { background: linear-gradient(135deg, #434343 0%, #000000 100%); }

        .cell span { position: relative; z-index: 3; color: #ffffff; font-family: 'Arial Black', sans-serif; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.15); }

        /* 各種動畫狀態 */
        .cell.merging { z-index: 200 !important; transition: transform 0.1s linear, opacity 0.2s ease !important; }
        .cell.target-pulse { z-index: 20 !important; animation: targetPulse 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes targetPulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .cell.upgrading { animation: upgradePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes upgradePop { 0% { transform: scale(0.6); } 100% { transform: scale(1); } }
        .cell.dropping { animation: bounceIn 0.4s ease-out; }
        @keyframes bounceIn { 0% { transform: translateY(-40px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        .btn-reset { width: 100%; padding: 14px; border-radius: 18px; border: none; background: #1e293b; color: white; font-weight: 900; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 0 #0f172a; transition: transform 0.1s; }
        .btn-reset:active { transform: translateY(2px); box-shadow: 0 2px 0 #0f172a; }

        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .modal-card { background: white; padding: 40px 30px; border-radius: 35px; text-align: center; width: 85%; max-width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        .floating-container { position: absolute; pointer-events: none; z-index: 1000; text-align: center; white-space: nowrap; }
        .floating-pts { color: #1e293b; font-weight: 900; font-size: 1.5rem; animation: ptsFly 0.8s ease-out forwards; text-shadow: 0 2px 10px rgba(255,255,255,0.8); }

        /* 連擊動畫優化 */
        .floating-combo {
            position: relative; color: #f43f5e; font-weight: 900; font-size: 2.2rem;
            animation: comboPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            font-style: italic; text-shadow: 0 4px 15px rgba(244, 63, 94, 0.4), 0 0 5px white;
            margin-top: -10px; will-change: transform, opacity; z-index: 10;
        }

        .combo-burst {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; z-index: -1; pointer-events: none;
            animation: burstPop 0.8s ease-out forwards;
        }

        @keyframes burstPop {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            25% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
        }

        @keyframes ptsFly {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translateY(-10px) scale(1.1); }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }

        @keyframes comboPop {
            0% { transform: scale(0.3) rotate(var(--rot-start, -10deg)); opacity: 0; }
            30% { transform: scale(1.4) rotate(var(--rot-mid, 5deg)); opacity: 1; }
            50% { transform: scale(1.2) rotate(var(--rot-end, 0deg)); }
            100% { transform: translateY(-40px) scale(1.2) rotate(var(--rot-end, 0deg)); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="title-pill"><h1>點我+1</h1></div>
        <div class="stats-grid">
            <div class="stat-card"><label>最佳分數</label><span id="best-score">0</span></div>
            <div class="stat-card"><label>最大號碼</label><span id="best-num">1</span></div>
        </div>
        <div class="score-val" id="score">0</div>
        
        <div class="energy-bar-container">
            <div class="energy-text"><span>體力</span><span id="energy-count">5 / 5</span></div>
            <div class="bar-bg"><div class="bar-fill" id="energy-fill"></div></div>
        </div>

        <div class="game-board" id="board"></div>
        <button class="btn-reset" onclick="resetGame()">重新洗牌</button>
    </div>

    <!-- 結束畫面 -->
    <div class="modal" id="game-over-modal">
        <div class="modal-card">
            <h2 style="font-size: 1.8rem; font-weight: 900;">體力耗盡！</h2>
            <p style="opacity: 0.6; margin-top: 10px;">本次得分</p>
            <div id="final-score" style="font-size: 3.5rem; margin: 10px 0 20px; font-weight: 900; color: #f43f5e; letter-spacing: -2px;">0</div>
            <button class="btn-reset" onclick="resetGame()" style="background: #f43f5e; box-shadow: 0 4px 0 #9f1239; padding: 18px;">挑戰再續</button>
        </div>
    </div>

    <script>
        // 音效系統 (使用瀏覽器內建 Web Audio API)
        const SoundSystem = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playGlass(frequency, volume, duration) {
                if(!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc1 = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(frequency, now);
                osc1.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(volume, now + 0.005);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc1.start(now);
                osc1.stop(now + duration);
            },
            play(action, intensity = 0, combo = 1) {
                this.init();
                const comboBoost = Math.min(1 + (combo - 1) * 0.1, 3); 
                if(action === 'tap') {
                    this.playGlass(1800 + intensity, 0.3, 0.1);
                } else if(action === 'match') {
                    this.playGlass(1100 + (intensity * 10), 0.5, 0.3);
                    setTimeout(() => this.playGlass(1600 * comboBoost, 0.4, 0.2), 50);
                }
            }
        };

        const colorClasses = ['color-1', 'color-2', 'color-3', 'color-4', 'color-5', 'color-6', 'color-7', 'color-8', 'color-9', 'color-10'];
        let state = { board: [], score: 0, energy: 5, combo: 0, isLocked: false };
        const cells = [];

        function init() {
            // 監聽互動以啟動音效內容
            ['mousedown', 'touchstart'].forEach(e => document.body.addEventListener(e, () => SoundSystem.init(), {once:true}));

            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const inner = document.createElement('div');
                inner.className = 'cell-inner';
                const span = document.createElement('span');
                cell.append(inner, span);
                cell.onclick = () => handleCellClick(i);
                boardEl.appendChild(cell);
                cells.push({el: cell, inner, span});
            }
            loadData();
            if(!state.board || state.board.length === 0) resetGame();
            render(true);
        }

        function loadData() {
            const saved = localStorage.getItem('tapme_v20');
            if(saved) {
                state = JSON.parse(saved);
                state.isLocked = false;
            }
        }

        function saveData() {
            localStorage.setItem('tapme_v20', JSON.stringify(state));
            const best = Number(localStorage.getItem('tapme_best_v20')) || 0;
            if(state.score > best) localStorage.setItem('tapme_best_v20', state.score);
            const max = Math.max(...state.board, 1);
            const bestN = Number(localStorage.getItem('tapme_num_v20')) || 1;
            if(max > bestN) localStorage.setItem('tapme_num_v20', max);
        }

        function resetGame() {
            document.getElementById('game-over-modal').classList.remove('active');
            state.board = Array(25).fill(0).map(() => Math.floor(Math.random() * 4) + 1);
            state.score = 0; state.energy = 5; state.combo = 0; state.isLocked = false;
            saveData(); render(true);
        }

        function render(full = false) {
            state.board.forEach((val, i) => {
                const c = cells[i];
                if(full || c.span.innerText != val) {
                    c.span.innerText = val || '';
                    c.inner.className = 'cell-inner ' + (colorClasses[(val - 1) % 10]);
                    c.el.style.opacity = val === 0 ? "0" : "1";
                    c.el.style.pointerEvents = val === 0 ? "none" : "auto";
                }
            });
            document.getElementById('score').innerText = state.score.toLocaleString();
            document.getElementById('energy-count').innerText = `${state.energy} / 5`;
            document.getElementById('energy-fill').style.width = `${(state.energy/5)*100}%`;
            document.getElementById('best-score').innerText = (localStorage.getItem('tapme_best_v20') || 0).toLocaleString();
            document.getElementById('best-num').innerText = localStorage.getItem('tapme_num_v20') || 1;
        }

        async function handleCellClick(idx) {
            if(state.isLocked || state.energy <= 0) return;
            state.isLocked = true;
            SoundSystem.play('tap', state.board[idx] * 20);
            state.energy--; state.board[idx]++; state.combo = 0;
            render();
            await processMatches(idx);
            state.isLocked = false;
            saveData(); render();
            if(state.energy <= 0 && !hasPossibleMatch()) {
                document.getElementById('final-score').innerText = state.score.toLocaleString();
                document.getElementById('game-over-modal').classList.add('active');
            }
        }

        async function processMatches(startIdx) {
            let targetIdx = startIdx;
            while(targetIdx !== -1) {
                const matches = findMatches(targetIdx);
                if(matches.length >= 3) {
                    state.combo++;
                    const val = state.board[targetIdx];
                    const ptsAdded = val * matches.length * state.combo * 10;
                    state.score += ptsAdded;
                    state.energy = Math.min(5, state.energy + 1);
                    
                    SoundSystem.play('match', val, state.combo);
                    showMatchFeedback(targetIdx, `+${ptsAdded}`, state.combo);
                    
                    if (state.combo >= 10) {
                        const container = document.getElementById('main-container');
                        container.classList.add('shake-active');
                        setTimeout(() => container.classList.remove('shake-active'), 300);
                    }

                    // 合併動畫
                    const movePromises = matches.filter(i => i !== targetIdx).map(async (i) => {
                        const cellEl = cells[i].el;
                        const targetRect = cells[targetIdx].el.getBoundingClientRect();
                        const originRect = cellEl.getBoundingClientRect();
                        cellEl.classList.add('merging');
                        cellEl.style.transform = `translate(${targetRect.left - originRect.left}px, ${targetRect.top - originRect.top}px) scale(0.5)`;
                        cellEl.style.opacity = '0';
                        state.board[i] = 0;
                    });

                    await Promise.all([...movePromises, new Promise(r => setTimeout(r, 150))]);
                    
                    matches.forEach(i => {
                        cells[i].el.classList.remove('merging');
                        cells[i].el.style.transform = '';
                        cells[i].el.style.opacity = '1';
                    });
                    
                    state.board[targetIdx]++; 
                    cells[targetIdx].el.classList.add('upgrading');
                    render();
                    await new Promise(r => setTimeout(r, 250));
                    cells[targetIdx].el.classList.remove('upgrading');
                    
                    await applyGravity();
                    
                    targetIdx = -1;
                    for(let i=0; i<25; i++) {
                        if(state.board[i] > 0 && findMatches(i).length >= 3) { targetIdx = i; break; }
                    }
                } else { targetIdx = -1; }
            }
        }

        function findMatches(idx) {
            const val = state.board[idx]; if(!val) return [];
            const queue = [idx], result = [], visited = new Set([idx]);
            while(queue.length > 0) {
                const curr = queue.shift(); result.push(curr);
                const r = Math.floor(curr/5), c = curr%5;
                [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr, nc]) => {
                    const ni = nr*5+nc;
                    if(nr>=0 && nr<5 && nc>=0 && nc<5 && !visited.has(ni) && state.board[ni] === val) {
                        visited.add(ni); queue.push(ni);
                    }
                });
            }
            return result;
        }

        async function applyGravity() {
            let dropped = false;
            for(let c=0; c<5; c++) {
                let emptyRow = -1;
                for(let r=4; r>=0; r--) {
                    const idx = r*5+c;
                    if(state.board[idx] === 0) { if(emptyRow === -1) emptyRow = r; }
                    else if(emptyRow !== -1) {
                        state.board[emptyRow*5+c] = state.board[idx]; state.board[idx] = 0;
                        cells[emptyRow*5+c].el.classList.add('dropping'); emptyRow--; dropped = true;
                    }
                }
                for(let r=emptyRow; r>=0 && r !== -1; r--) {
                    state.board[r*5+c] = Math.floor(Math.random() * 4) + 1;
                    cells[r*5+c].el.classList.add('dropping'); dropped = true;
                }
            }
            render();
            if(dropped) {
                await new Promise(r => setTimeout(r, 400));
                cells.forEach(c => c.el.classList.remove('dropping'));
            }
        }

        function hasPossibleMatch() {
            for(let i=0; i<25; i++) { if(state.board[i] > 0 && findMatches(i).length >= 3) return true; }
            return false;
        }

        function createBurstSVG() {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 100 100");
            svg.setAttribute("class", "combo-burst");
            const points = [];
            const spikes = 16;
            for(let i=0; i<spikes*2; i++) {
                const angle = (i * Math.PI) / spikes;
                const r = i % 2 === 0 ? 48 : 25;
                points.push(`${50 + r * Math.cos(angle)},${50 + r * Math.sin(angle)}`);
            }
            const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            polygon.setAttribute("points", points.join(" "));
            polygon.setAttribute("fill", "url(#g)");
            svg.innerHTML = `<defs><radialGradient id="g"><stop offset="0%" stop-color="#fff"/><stop offset="60%" stop-color="#ffff00"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>`;
            svg.appendChild(polygon);
            return svg;
        }

        function showMatchFeedback(idx, ptsText, combo) {
            const rect = cells[idx].el.getBoundingClientRect();
            const container = document.createElement('div');
            container.className = 'floating-container';
            container.style.left = `${rect.left + rect.width/2}px`;
            container.style.top = `${rect.top + rect.height/2}px`;
            container.style.transform = 'translate(-50%, -50%)';

            const ptsEl = document.createElement('div');
            ptsEl.className = 'floating-pts';
            ptsEl.innerText = ptsText;
            container.appendChild(ptsEl);

            if(combo > 1) {
                const comboEl = document.createElement('div');
                comboEl.className = 'floating-combo';
                comboEl.innerText = `COMBO x${combo}`;
                
                const baseRot = Math.floor(Math.random() * 40) - 20;
                comboEl.style.setProperty('--rot-start', `${baseRot - 10}deg`);
                comboEl.style.setProperty('--rot-mid', `${baseRot + 10}deg`);
                comboEl.style.setProperty('--rot-end', `${baseRot}deg`);

                if (combo >= 20) {
                    container.appendChild(createBurstSVG());
                    comboEl.style.fontSize = "3.5rem";
                    comboEl.style.color = "#ffeb3b";
                } else if (combo >= 10) {
                    comboEl.style.fontSize = "2.8rem";
                }
                container.appendChild(comboEl);
            }

            document.body.appendChild(container);
            setTimeout(() => container.remove(), 800);
        }

        window.onload = init;
    </script>
</body>
</html>
